# =============================================================
# MoneyFlow Apache Virtual Host — Hardened Configuration
# =============================================================

# Hide Apache version from HTTP responses and error pages
ServerTokens Prod
ServerSignature Off

# Disable TRACE method (prevents Cross-Site Tracing attacks)
TraceEnable Off

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/webroot

    # Limit request body size to 5MB to prevent upload abuse
    LimitRequestBody 5242880

    <Directory /var/www/html/webroot>
        # SECURITY: -Indexes prevents directory listing; -FollowSymLinks prevents symlink traversal
        Options -Indexes -FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html>
        AllowOverride None
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # =============================================
    # Security Headers
    # =============================================

    # Prevent MIME-type sniffing
    Header always set X-Content-Type-Options "nosniff"

    # Prevent clickjacking
    Header always set X-Frame-Options "DENY"

    # Legacy XSS filter (for older browsers)
    Header always set X-XSS-Protection "1; mode=block"

    # Content Security Policy — restrict resource loading
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

    # HSTS — enforce HTTPS (effective when behind TLS termination)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Control referrer information
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Restrict browser features
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

    # =============================================
    # Cache Control
    # =============================================

    # Prevent caching of all dynamic pages (sensitive data)
    Header always set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
    Header always set Pragma "no-cache"
    Header always set Expires "0"

    # =============================================
    # Access Restrictions
    # =============================================

    # Block access to hidden files (e.g., .env, .git, .htaccess)
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # Block access to hidden directories
    <DirectoryMatch "/\.">
        Require all denied
    </DirectoryMatch>

    # Block access to sensitive file types that should never be served
    <FilesMatch "\.(sql|sh|md|yml|yaml|env|bak|orig|swp|swo|log|ini|conf|dist)$">
        Require all denied
    </FilesMatch>

    # Block access to PHP files that are not in the webroot
    # (Prevents execution of utility scripts via web)
    <LocationMatch "^/(settings|utilities|layouts)/">
        Require all denied
    </LocationMatch>

</VirtualHost>
